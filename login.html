<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kidora1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        :root {
            --spacing-xs: 0.5rem;
            --spacing-sm: 0.75rem;
            --spacing-base: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 1.5rem;
            --font-size-2xl: 2rem;
        }

        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        /* Left section (Form) */
        .auth-left {
            flex: 1;
            padding: var(--spacing-lg);
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-light);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: var(--spacing-xs);
        }

        .auth-header h1 span {
            color: var(--primary-color);
        }

        .auth-header h2 {
            font-size: var(--font-size-xl);
            color: var(--text-color);
            margin-bottom: var(--spacing-xs);
        }

        .auth-header p {
            font-size: var(--font-size-sm);
            color: var(--text-muted);
        }

        /* Form */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-base);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: var(--font-size-base);
            font-family: inherit;
            background-color: var(--bg-light);
            color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(78, 156, 175, 0.08);
        }

        .password-group {
            position: relative;
        }

        #toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        #toggle-password:hover {
            color: var(--primary-color);
        }

        .btn {
            padding: 0.9rem;
            border: none;
            border-radius: var(--border-radius);
            background: var(--primary-color);
            color: #fff;
            font-size: var(--font-size-base);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .forgot-password-link {
            text-align: right;
            font-size: var(--font-size-sm);
        }

        .forgot-password-link a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password-link a:hover {
            text-decoration: underline;
        }

        .auth-footer {
            margin-top: var(--spacing-lg);
            text-align: center;
            font-size: var(--font-size-sm);
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Right section (Image) */
        .auth-right {
            display: none;
        }

        /* Tablet and up */
        @media (min-width: 768px) {
            .auth-page {
                flex-direction: row;
            }

            .auth-left {
                flex: 0.45;
                padding: var(--spacing-2xl);
            }

            .auth-right {
                flex: 0.55;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow: hidden;
            }

            .auth-right img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
        }

        /* Large screens */
        @media (min-width: 1200px) {
            .auth-container {
                max-width: 450px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <!-- Left Side - Form -->
        <div class="auth-left">
            <div class="auth-container">
                <div class="auth-header">
                    <a href="index.html" style="text-decoration: none;">
                        <h1>KIDORA<span>1</span></h1>
                    </a>
                    <h2>Welcome Back</h2>
                    <p>Login to access your dashboard</p>
                </div>

                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <input type="email" id="email" class="form-control" placeholder="Email Address" required>
                    </div>
                    <div class="form-group password-group">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                        <button type="button" id="toggle-password">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <div class="forgot-password-link">
                        <a href="forgot-password.html">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary">Log In</button>
                </form>

                <div class="auth-footer">
                    New to Kidora1? <a href="signup.html">Sign Up</a>
                </div>
            </div>
        </div>

        <!-- Right Side - Image -->
        <div class="auth-right">
            <img src="https://images.unsplash.com/photo-1628705249474-fdf782614c21?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fGZhbWlseXxlbnwwfHwwfHx8MA%3D%3D" alt="Login illustration">
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script>
        const toggle = document.getElementById("toggle-password");
        const input = document.querySelector(".password-group input");

        toggle.addEventListener("click", () => {
            const type = input.type === "password" ? "text" : "password";
            input.type = type;
            toggle.innerHTML = type === "password"
                ? '<i class="fa-solid fa-eye"></i>'
                : '<i class="fa-solid fa-eye-slash"></i>';
        });

        
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('api/auth.php?action=login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
            // Prevent admin from logging in here
            if (data.user.role === 'admin') {
                alert('Admin accounts cannot log in from this page. Please use the Admin Login page.');
                return;
            }
            alert(`Welcome back, ${data.user.full_name}!`);
            window.location.href = 'dashboard.html';
        } else {
            alert(data.message || 'Invalid credentials.');
        }
    } catch (err) {
        alert('An unexpected error occurred.');
    }
});
    </script>
</body>

</html>
