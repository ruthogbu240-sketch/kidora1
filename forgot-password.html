<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Kidora1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 100px auto;
            text-align: center;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <h1>KIDORA<span>1</span></h1>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="auth-container card">
            <h2>Reset Password</h2>
            <p style="margin-bottom: 20px;">Enter your email to receive a reset link</p>

            <form id="forgot-password-form">
                <div class="form-group">
                    <input type="email" id="reset-email" class="form-control" placeholder="Email Address" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
                <div id="message-container" class="message"></div>
            </form>
            <p style="margin-top: 15px;"><a href="login.html" style="color: var(--primary-color); font-weight: 600;">Back to Login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            const messageDiv = document.getElementById('message-container');
            
            // Clear previous message
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            // Disable button to prevent double submission
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            try {
                const response = await fetch('api/auth.php?action=request_reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                    
                    // If demo link is provided (for testing), show it
                    if (data.demo_link) {
                        const linkMsg = document.createElement('p');
                        linkMsg.style.marginTop = '10px';
                        linkMsg.innerHTML = `<strong>Demo link (copy this):</strong> <a href="${data.demo_link}" target="_blank">${data.demo_link}</a>`;
                        messageDiv.appendChild(linkMsg);
                    }
                    
                    // Clear email field
                    document.getElementById('reset-email').value = '';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message || 'Something went wrong. Please try again.';
                    messageDiv.style.display = 'block';
                }
            } catch (err) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Network error. Please try again later.';
                messageDiv.style.display = 'block';
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
