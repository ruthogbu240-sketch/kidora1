<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kidora1</title>
    <meta name="description" content="Kidora1 Dashboard - Manage your learning journey">
    <meta name="theme-color" content="#2E86AB">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/dashboard.css">
    <link rel="stylesheet" href="styles/aibot.css">
    <link rel="stylesheet" href="styles/footer.css">
</head>
<body>
<div class="dashboard-layout">
    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar – content will be dynamically generated by dashboard.js -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>KIDORA<span>1</span></h2>
        </div>
        <nav class="sidebar-nav">
            <ul id="dynamic-sidebar-menu">
                <!-- JS will populate this list based on user role -->
            </ul>
        </nav>
        <div class="sidebar-footer">
            <p>© 2026 Kidora1</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar glass">
            <div class="top-bar-left">
                <button class="hamburger-menu" id="hamburgerMenu" aria-label="Toggle menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div>
                    <h2 class="top-bar-title" id="page-title">Overview</h2>
                    <p class="breadcrumb"><i class="fa-solid fa-home"></i> Home / <span id="breadcrumb-text">Overview</span></p>
                </div>
            </div>
            <div class="header-actions">
                <div class="notification-bell" id="notification-bell" data-view="notifications">
                    <i class="fa-solid fa-bell"></i>
                    <span class="notification-badge" id="notification-count">0</span>
                </div>
            </div>
            <div class="user-profile">
                <div class="user-info">
                    <span class="name" id="user-name">User</span>
                    <span class="role" id="user-role">Student</span>
                </div>
                <div class="avatar-placeholder" id="avatar">U</div>
            </div>
        </header>

        <div id="content-area" class="content-area">
            <div class="page-header">
                <!-- Dashboard content loads here -->
            </div>
        </div>
    </main>
</div>

<!-- Mobile Menu Toggle Script (unchanged) -->
<script>
    const hamburgerMenu = document.getElementById('hamburgerMenu');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function closeMobileMenu() {
        sidebar.classList.remove('mobile-open');
        sidebarOverlay.classList.remove('mobile-open');
        document.body.style.overflow = 'auto';
    }
    function openMobileMenu() {
        sidebar.classList.add('mobile-open');
        sidebarOverlay.classList.add('mobile-open');
        document.body.style.overflow = 'hidden';
    }
    hamburgerMenu.addEventListener('click', (e) => {
        e.stopPropagation();
        if (sidebar.classList.contains('mobile-open')) closeMobileMenu();
        else openMobileMenu();
    });
    sidebarOverlay.addEventListener('click', () => closeMobileMenu());
    sidebar.addEventListener('click', (e) => e.stopPropagation());
    document.querySelectorAll('.sidebar-nav a').forEach(link => {
        link.addEventListener('click', () => { if (link.id !== 'logout-btn') closeMobileMenu(); });
    });
    window.addEventListener('resize', () => { if (window.innerWidth > 768) closeMobileMenu(); });
    document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && !hamburgerMenu.contains(e.target)) closeMobileMenu();
    });
</script>

<!-- AIBOT Floating Widget -->
<div class="aibot-widget" id="aibot-widget">
    <div class="aibot-chat" id="aibot-chat" style="display: none;">
        <div class="aibot-header">
            <div style="font-weight: 700; display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-robot"></i> AIBOT Expert
            </div>
            <button id="aibot-close" style="background: none; border: none; color: white; cursor: pointer;">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="aibot-body" id="aibot-body">
            <div class="aibot-msg bot">Hi! I'm AIBOT. How can I help you with your parenting journey today? 👋</div>
        </div>
        <div class="aibot-footer">
            <input type="text" id="aibot-input" class="aibot-input" placeholder="Ask a question...">
            <button class="aibot-send" id="aibot-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
    <div class="aibot-bubble pulse" id="aibot-toggle">
        <i class="fa-solid fa-comment-dots"></i>
    </div>
</div>

<script type="module" src="js/dashboard.js?v=4.0"></script>
</body>
</html>
