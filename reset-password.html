<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Kidora1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 100px auto;
            text-align: center;
        }
        .password-group {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <h1>KIDORA<span>1</span></h1>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="auth-container card">
            <h2>Create New Password</h2>
            <p style="margin-bottom: 20px;">Enter your new password below.</p>

            <form id="reset-password-form">
                <input type="hidden" id="reset-token">
                <input type="hidden" id="reset-email">
                <div class="form-group password-group">
                    <input type="password" id="new-password" class="form-control" placeholder="New Password" required>
                    <button type="button" class="toggle-password" data-target="new-password">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <div class="form-group password-group">
                    <input type="password" id="confirm-password" class="form-control" placeholder="Confirm Password" required>
                    <button type="button" class="toggle-password" data-target="confirm-password">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
                <div id="message-container" class="message"></div>
            </form>
            <p style="margin-top: 15px;"><a href="../login.html" style="color: var(--primary-color); font-weight: 600;">Back to Login</a></p>
        </div>
    </div>

    <script>
        // Get token and email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        
        if (!token || !email) {
            document.getElementById('message-container').className = 'message error';
            document.getElementById('message-container').textContent = 'Invalid reset link. Please request a new one.';
            document.getElementById('message-container').style.display = 'block';
            document.querySelector('form').style.display = 'none';
        } else {
            document.getElementById('reset-token').value = token;
            document.getElementById('reset-email').value = email;
        }
        
        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                btn.querySelector('i').classList.toggle('fa-eye');
                btn.querySelector('i').classList.toggle('fa-eye-slash');
            });
        });
        
        // Form submission
        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const token = document.getElementById('reset-token').value;
            const email = document.getElementById('reset-email').value;
            const messageDiv = document.getElementById('message-container');
            
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            if (newPassword !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Passwords do not match.';
                messageDiv.style.display = 'block';
                return;
            }
            
            if (newPassword.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Password must be at least 6 characters.';
                messageDiv.style.display = 'block';
                return;
            }
            
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            
            try {
                const response = await fetch('auth.php?action=reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token, new_password: newPassword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = data.message + ' Redirecting to login...';
                    messageDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '../login.html';
                    }, 2000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (err) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Network error. Please try again.';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
                console.error(err);
            }
        });
    </script>
</body>
</html>
