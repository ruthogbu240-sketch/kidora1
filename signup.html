<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Kidora1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
        }
        .auth-left {
            flex: 1;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            overflow-y: auto;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .auth-header h1 span {
            color: var(--primary);
        }
        .auth-header h2 {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .password-group {
            position: relative;
        }
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }
        .btn {
            padding: 0.9rem;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        .form-group small {
            display: block;
            text-align: left;
            margin-top: 5px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .auth-right {
            display: none;
        }
        @media (min-width: 768px) {
            .auth-page { flex-direction: row; }
            .auth-left { flex: 0.45; padding: 3rem; }
            .auth-right { flex: 0.55; display: flex; align-items: center; justify-content: center; overflow: hidden; }
            .auth-right img { width: 100%; height: 100%; object-fit: cover; }
        }
        @media (min-width: 1200px) {
            .auth-container { max-width: 450px; }
        }
        .error-message {
            color: #dc3545;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: none;
        }
        .form-group.error .form-control {
            border-color: #dc3545;
        }
        .form-group.error .error-message {
            display: block;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-left">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" style="text-decoration: none;">
                    <h1>KIDORA<span>1</span></h1>
                </a>
                <h2>Join Our Community</h2>
                <p>Start your journey as a parent with Kidora1</p>
            </div>

            <form id="signup-form" class="auth-form">
                <div class="form-group" id="name-group">
                    <input type="text" id="name" class="form-control" placeholder="Full Name" required>
                    <div class="error-message" id="name-error">Full name is required.</div>
                </div>
                <div class="form-group" id="email-group">
                    <input type="email" id="email" class="form-control" placeholder="Email Address" required>
                    <div class="error-message" id="email-error">Please enter a valid email address.</div>
                </div>
                <div class="form-group password-group" id="password-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <button type="button" class="toggle-btn" id="toggle-signup-password">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                    <div class="error-message" id="password-error">Password must be at least 6 characters.</div>
                </div>
                <div class="form-group" id="location-group">
                    <input type="text" id="location" class="form-control" placeholder="Detecting location..." readonly>
                    <small>
                        <a href="#" id="change-location">Change manually</a>
                    </small>
                </div>
                <!-- Role is removed – all new users become parents automatically -->
                <button type="submit" class="btn btn-primary">Create Account</button>
                <div id="message-container" class="message"></div>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>
    <div class="auth-right">
        <img src="https://images.unsplash.com/photo-1628705249474-fdf782614c21?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fGZhbWlseXxlbnwwfHwwfHx8MA%3D%3D" alt="Signup illustration">
    </div>
</div>

<script type="module">
    import { detectLocation, setManualLocation } from './js/location.js';

    const locInput = document.getElementById('location');
    detectLocation().then(loc => {
        locInput.value = loc;
    });

    document.getElementById('change-location').addEventListener('click', (e) => {
        e.preventDefault();
        const newLoc = prompt("Enter your location (City, Country):");
        if (newLoc) {
            locInput.value = newLoc;
            setManualLocation(newLoc);
        }
    });

    const toggleBtn = document.getElementById('toggle-signup-password');
    const passInput = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
        const type = passInput.type === 'password' ? 'text' : 'password';
        passInput.type = type;
        const icon = toggleBtn.querySelector('i');
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });

    // Frontend validation
    function validateName() {
        const name = document.getElementById('name').value.trim();
        const group = document.getElementById('name-group');
        if (name === '') {
            group.classList.add('error');
            return false;
        }
        group.classList.remove('error');
        return true;
    }

    function validateEmail() {
        const email = document.getElementById('email').value.trim();
        const group = document.getElementById('email-group');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (email === '' || !emailRegex.test(email)) {
            group.classList.add('error');
            return false;
        }
        group.classList.remove('error');
        return true;
    }

    function validatePassword() {
        const password = document.getElementById('password').value;
        const group = document.getElementById('password-group');
        if (password.length < 6) {
            group.classList.add('error');
            return false;
        }
        group.classList.remove('error');
        return true;
    }

    document.getElementById('name').addEventListener('input', validateName);
    document.getElementById('email').addEventListener('input', validateEmail);
    document.getElementById('password').addEventListener('input', validatePassword);

    const form = document.getElementById('signup-form');
    const messageDiv = document.getElementById('message-container');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        messageDiv.className = 'message';
        messageDiv.style.display = 'none';

        const isNameValid = validateName();
        const isEmailValid = validateEmail();
        const isPasswordValid = validatePassword();

        if (!isNameValid || !isEmailValid || !isPasswordValid) {
            messageDiv.className = 'message error';
            messageDiv.textContent = 'Please fix the errors above.';
            messageDiv.style.display = 'block';
            return;
        }

        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';

        const fullName = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const location = document.getElementById('location').value;

        try {
            const response = await fetch('api/auth.php?action=register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, password, role: 'parent', location })
            });

            const data = await response.json();

            if (data.success) {
                messageDiv.className = 'message success';
                messageDiv.textContent = data.message + ' Redirecting to dashboard...';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                messageDiv.className = 'message error';
                messageDiv.textContent = data.message || 'Registration failed.';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        } catch (err) {
            messageDiv.className = 'message error';
            messageDiv.textContent = 'Network error. Please try again.';
            messageDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account';
        }
    });
</script>

<script type="module" src="js/auth.js"></script>
</body>
</html>
