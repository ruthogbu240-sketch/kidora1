<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kidora1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1A2F3A 0%, #0F1E26 100%);
        }
        .auth-left {
            flex: 1;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .auth-header h1 span {
            color: var(--primary);
        }
        .auth-header h2 {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .admin-badge {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .password-group {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .auth-container {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-left">
        <div class="auth-container">
            <div class="auth-header">
                <div class="admin-badge">ADMIN PORTAL</div>
                <a href="index.html" style="text-decoration: none;">
                    <h1>KIDORA<span>1</span></h1>
                </a>
                <h2>Admin Access</h2>
                <p>Secure login for administrators only</p>
            </div>
            <form id="admin-login-form" class="auth-form">
                <div class="form-group">
                    <input type="email" id="email" class="form-control" placeholder="Admin Email" required>
                </div>
                <div class="form-group password-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <button type="button" class="toggle-password" id="toggle-password">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <button type="submit" class="btn btn-primary">Login as Admin</button>
                <div id="message-container" class="message"></div>
            </form>
            <div class="auth-footer">
                <a href="login.html">User Login</a> | <a href="forgot-password.html">Forgot Password?</a>
            </div>
        </div>
    </div>
</div>
<script>
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });
    }
    
    const form = document.getElementById('admin-login-form');
    const messageDiv = document.getElementById('message-container');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        messageDiv.className = 'message';
        messageDiv.style.display = 'none';
        
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';
        
        try {
            const response = await fetch('api/auth.php?action=admin_login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (data.success) {
                messageDiv.className = 'message success';
                messageDiv.textContent = 'Redirecting to admin dashboard...';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                messageDiv.className = 'message error';
                messageDiv.textContent = data.message || 'Invalid admin credentials.';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login as Admin';
            }
        } catch (err) {
            messageDiv.className = 'message error';
            messageDiv.textContent = 'Network error. Please try again.';
            messageDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Login as Admin';
        }
    });
</script>
</body>
</html>
